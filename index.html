<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>SUB-20 · Trkački plan</title>
<meta name="theme-color" content="#0A0A0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SUB-20">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<style>
:root{
  --bg:#0A0A0F; --card:#16161D; --card2:#1D1D26; --line:rgba(255,255,255,.08);
  --txt:#F5F5F7; --txt2:#9C9CA8; --txt3:#63636E;
  --pink:#FA2E55; --green:#9BE821; --cyan:#00D5FA; --amber:#FFB020; --red:#FF453A;
  --r:18px; --tab-h:58px;
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  background:var(--bg); color:var(--txt); min-height:100dvh;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
  -webkit-font-smoothing:antialiased; touch-action:manipulation; overscroll-behavior-y:none;
}
button,input,select,textarea{font:inherit;color:inherit}
button{background:none;border:0;cursor:pointer;touch-action:manipulation}

/* ---------- header ---------- */
header{
  position:sticky;top:0;z-index:30;
  padding:calc(var(--sat) + 10px) 18px 10px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,10,15,.78);
  -webkit-backdrop-filter:blur(20px) saturate(180%);backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--line);
}
.h-title{font-weight:800;font-size:1.05rem;letter-spacing:.06em}
.h-title span{color:var(--pink)}
.h-sub{font-size:.72rem;color:var(--txt2);margin-top:2px;font-weight:600;letter-spacing:.02em}
.h-gear{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--txt2)}
.h-gear:active{transform:scale(.9);color:var(--txt)}

/* ---------- pages ---------- */
main{padding:14px 16px calc(var(--tab-h) + var(--sab) + 26px)}
.page{display:none;animation:fadein .22s ease}
.page.active{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- cards ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px}
.card-t{font-size:.72rem;font-weight:700;color:var(--txt2);letter-spacing:.09em;text-transform:uppercase;margin-bottom:12px}
.big{font-size:3.4rem;font-weight:800;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums}
.big-sub{font-size:.8rem;color:var(--txt2);font-weight:600;margin-top:6px}

/* hero danas */
.hero{display:flex;gap:12px;margin-bottom:14px}
.hero .card{flex:1;margin:0;text-align:center;padding:18px 10px}
.hero .big{font-size:2.9rem}
.pill{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:.78rem;font-weight:700;color:var(--txt2)}

/* trening kartica */
.tag{display:inline-block;font-size:.68rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:999px;margin-bottom:10px}
.tag.lako{background:rgba(0,213,250,.14);color:var(--cyan)}
.tag.tempo{background:rgba(250,46,85,.14);color:var(--pink)}
.tag.int{background:rgba(250,46,85,.18);color:var(--pink)}
.tag.lr{background:rgba(155,232,33,.14);color:var(--green)}
.tag.snaga{background:rgba(255,176,32,.14);color:var(--amber)}
.tag.odmor{background:rgba(255,255,255,.08);color:var(--txt2)}
.tag.trka{background:var(--pink);color:#fff}
.tag.test{background:rgba(0,213,250,.14);color:var(--cyan)}
.desc{white-space:pre-line;font-size:.92rem;line-height:1.5;color:var(--txt)}
.meta{display:flex;gap:16px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
.meta div{font-size:.75rem;color:var(--txt2)}
.meta b{display:block;font-size:1.15rem;color:var(--txt);font-variant-numeric:tabular-nums;margin-bottom:2px}

/* dugmad */
.btnrow{display:flex;gap:10px;margin-top:14px}
.btn{
  flex:1;min-height:50px;border-radius:14px;font-weight:800;font-size:.95rem;
  background:var(--pink);color:#fff;transition:transform .12s ease,opacity .12s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn:active{transform:scale(.96)}
.btn.ghost{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
.btn.green{background:var(--green);color:#0A0A0F}
.btn.danger{background:rgba(255,69,58,.14);color:var(--red)}
.btn.sm{min-height:44px;font-size:.85rem;flex:none;padding:0 18px}
.btn[disabled]{opacity:.4;pointer-events:none}

/* status chip */
.st{font-size:.68rem;font-weight:800;padding:4px 9px;border-radius:999px;white-space:nowrap}
.st.done{background:rgba(155,232,33,.16);color:var(--green)}
.st.skip{background:rgba(255,176,32,.14);color:var(--amber)}
.st.pending{background:rgba(255,255,255,.07);color:var(--txt3)}
.st.rest{color:var(--txt3)}

/* plan accordion */
.wk{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.wk-h{width:100%;display:flex;align-items:center;gap:12px;padding:14px 16px;text-align:left}
.wk-h:active{background:var(--card2)}
.wk-n{font-size:1.25rem;font-weight:800;font-variant-numeric:tabular-nums;min-width:44px}
.wk-i{flex:1}
.wk-d{font-size:.72rem;color:var(--txt2);font-weight:600}
.wk-f{font-size:.78rem;font-weight:700;margin-top:2px}
.wk-km{text-align:right;font-size:.72rem;color:var(--txt2);font-weight:600}
.wk-km b{display:block;font-size:.95rem;color:var(--txt);font-variant-numeric:tabular-nums}
.wk-bar{height:3px;background:var(--card2)}
.wk-bar i{display:block;height:100%;background:var(--green);transition:width .5s ease}
.wk-body{display:none;border-top:1px solid var(--line)}
.wk.open .wk-body{display:block}
.day{width:100%;display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line);text-align:left;min-height:52px}
.day:last-child{border-bottom:0}
.day:active{background:var(--card2)}
.day-d{font-size:.75rem;font-weight:800;color:var(--txt2);min-width:34px}
.day-t{flex:1;font-size:.85rem;line-height:1.35}
.day-t small{display:block;color:var(--txt3);font-size:.72rem;margin-top:2px}
.day-km{font-size:.8rem;color:var(--txt2);font-variant-numeric:tabular-nums;min-width:44px;text-align:right}
.swap-list{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--card2)}
.day.swap-sel{background:rgba(255,45,85,.14);box-shadow:inset 3px 0 0 var(--pink)}
.day.swap-lock{opacity:.4;pointer-events:none}

/* forma */
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.f-field{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:9px 12px}
.f-field.full{grid-column:1/-1}
.f-field label{display:block;font-size:.66rem;font-weight:700;color:var(--txt2);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.f-field input[type=text],.f-field input[type=number],.f-field input[type=date],.f-field textarea,.f-field select{
  width:100%;background:none;border:0;outline:none;font-size:1.05rem;font-weight:700;font-variant-numeric:tabular-nums;color:var(--txt);
  -webkit-appearance:none;appearance:none;
}
.f-field textarea{font-weight:500;font-size:.95rem;resize:none;min-height:56px;line-height:1.4}
.f-field .calc{font-size:1.05rem;font-weight:800;color:var(--cyan)}
.f-req{color:var(--pink)}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:30px;background:none}
input[type=range]::-webkit-slider-runnable-track{height:5px;border-radius:3px;background:var(--line)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:#fff;margin-top:-10.5px;box-shadow:0 1px 6px rgba(0,0,0,.5)}
.range-v{float:right;font-weight:800;font-variant-numeric:tabular-nums;color:var(--txt)}

/* prstenovi */
.rings-wrap{display:flex;align-items:center;gap:18px}
.rings{width:150px;height:150px;flex:none}
.ring-track{fill:none;stroke-width:15;stroke-linecap:round;opacity:.16}
.ring-val{fill:none;stroke-width:15;stroke-linecap:round;transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)}
.rings-leg{flex:1}
.rl{margin-bottom:12px}
.rl:last-child{margin-bottom:0}
.rl b{display:block;font-size:1.35rem;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.rl span{font-size:.72rem;font-weight:700;letter-spacing:.04em}

/* grafikoni */
.chart{width:100%;height:auto;display:block;margin-top:4px}
.ax{font-size:8.5px;fill:var(--txt3);font-weight:600}
.chart-info{font-size:9.5px;fill:var(--pink);font-weight:800}
.chart-hint{font-size:8.5px;fill:var(--txt3);font-weight:600;font-style:italic}
.gl{stroke:rgba(255,255,255,.06);stroke-width:1}

/* koleno banner */
.kb{border-radius:var(--r);padding:14px 16px;margin-bottom:14px;font-weight:700;font-size:.9rem;display:flex;gap:10px;align-items:center;border:1px solid}
.kb.ok{background:rgba(155,232,33,.1);border-color:rgba(155,232,33,.3);color:var(--green)}
.kb.warn{background:rgba(255,176,32,.1);border-color:rgba(255,176,32,.3);color:var(--amber)}
.kb.stop{background:rgba(255,69,58,.12);border-color:rgba(255,69,58,.35);color:var(--red)}
.kb small{display:block;font-weight:600;font-size:.72rem;opacity:.85;margin-top:2px}

/* koleno lista */
.krow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);width:100%;text-align:left}
.krow:last-child{border-bottom:0}
.krow:active{opacity:.7}
.kp{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.05rem;flex:none;font-variant-numeric:tabular-nums}
.kp.p0{background:rgba(155,232,33,.14);color:var(--green)}
.kp.p1{background:rgba(255,176,32,.16);color:var(--amber)}
.kp.p2{background:rgba(255,69,58,.16);color:var(--red)}
.krow .ki{flex:1;min-width:0}
.krow .kd{font-size:.78rem;font-weight:700}
.krow .kn{font-size:.78rem;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.krow .ka{font-size:.68rem;color:var(--txt3);font-weight:700}

/* predikcija */
.pstat{display:flex;gap:12px;margin-bottom:14px}
.pstat .card{flex:1;margin:0;text-align:center;padding:16px 8px}
.pstat .big{font-size:1.9rem}
.prow{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}
.prow:last-child{border-bottom:0}
.prow .pi{flex:1;min-width:0}
.prow .pl{font-size:.85rem;font-weight:700}
.prow .pm{font-size:.7rem;color:var(--txt3);margin-top:2px;font-weight:600}
.ptin{width:74px;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:9px 6px;text-align:center;font-weight:800;font-size:.95rem;font-variant-numeric:tabular-nums;outline:none;color:var(--txt)}
.ptin:focus{border-color:var(--cyan)}
.ptin::placeholder{color:var(--txt3);font-weight:600}
.pout{min-width:76px;text-align:right}
.pout b{display:block;font-size:.95rem;font-weight:800;font-variant-numeric:tabular-nums}
.pout span{font-size:.68rem;font-weight:800}
.pos{color:var(--green)}.neg{color:var(--red)}
.wseg{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.wseg:last-child{border-bottom:0}
.wseg-l{flex:1;min-width:0;font-size:.78rem;font-weight:700;color:var(--txt2)}
.wseg-in{width:82px;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:9px 6px;text-align:center;font-weight:800;font-size:.95rem;font-variant-numeric:tabular-nums;outline:none;color:var(--txt)}
.wseg-in:focus{border-color:var(--cyan)}
.wseg-in::placeholder{color:var(--txt3);font-weight:600}
.wseg-out{min-width:120px;text-align:right}
.btn-ai{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px;font-weight:800;font-size:.88rem;color:var(--txt);cursor:pointer}
.btn-ai:active{opacity:.7}
.btn-ai:disabled{opacity:.5}
.ai-out{margin-top:10px;font-size:.85rem;line-height:1.55;color:var(--txt2);white-space:pre-wrap}
.ai-out.err{color:var(--red,#ff5a5a)}

/* banner backup */
.bban{display:flex;align-items:center;gap:10px;background:var(--card2);border:1px dashed rgba(255,255,255,.18);border-radius:14px;padding:11px 14px;margin-bottom:14px;font-size:.82rem;font-weight:600;color:var(--txt2)}
.bban button{color:var(--cyan);font-weight:800;font-size:.82rem;padding:6px}

/* sheet modal */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40;opacity:0;pointer-events:none;transition:opacity .25s}
.backdrop.on{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--card);
  border-radius:22px 22px 0 0;border-top:1px solid var(--line);
  max-height:90dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:8px 18px calc(var(--sab) + 22px);
  transform:translateY(105%);transition:transform .3s cubic-bezier(.32,.72,0,1);
}
.sheet.on{transform:none}
.grab{width:38px;height:5px;border-radius:3px;background:rgba(255,255,255,.2);margin:6px auto 14px}
.sh-t{font-size:1.1rem;font-weight:800;margin-bottom:2px}
.sh-s{font-size:.75rem;color:var(--txt2);font-weight:600;margin-bottom:12px}
.seg{display:flex;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:3px;margin-top:12px}
.seg button{flex:1;min-height:40px;border-radius:9px;font-size:.8rem;font-weight:800;color:var(--txt2)}
.seg button.on{background:var(--bg);color:var(--txt);box-shadow:0 1px 4px rgba(0,0,0,.4)}
.seg button.on.c-done{color:var(--green)}
.seg button.on.c-skip{color:var(--amber)}

/* check animacija */
.done-pop{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;pointer-events:none}
.done-pop svg{width:120px;height:120px;animation:pop .55s cubic-bezier(.2,1.6,.4,1) both}
.done-pop circle{fill:var(--green)}
.done-pop path{stroke:#0A0A0F;stroke-width:9;stroke-linecap:round;stroke-linejoin:round;fill:none;stroke-dasharray:60;stroke-dashoffset:60;animation:draw .4s .2s ease-out forwards}
@keyframes pop{from{transform:scale(.2);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes draw{to{stroke-dashoffset:0}}
.fade-out{animation:fout .4s .9s ease forwards}
@keyframes fout{to{opacity:0}}

/* tab bar */
nav{
  position:fixed;left:0;right:0;bottom:0;z-index:35;
  height:calc(var(--tab-h) + var(--sab));padding-bottom:var(--sab);
  display:flex;
  background:rgba(22,22,29,.72);
  -webkit-backdrop-filter:blur(24px) saturate(180%);backdrop-filter:blur(24px) saturate(180%);
  border-top:1px solid var(--line);
}
nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--txt3);min-height:44px}
nav button svg{width:23px;height:23px}
nav button span{font-size:.6rem;font-weight:700;letter-spacing:.02em}
nav button.on{color:var(--pink)}
nav button:active{transform:scale(.92)}

.empty{text-align:center;color:var(--txt3);font-size:.85rem;padding:26px 10px;font-weight:600}
.note-src{font-size:.7rem;color:var(--txt3);font-weight:600;margin-top:10px}
hr.sep{border:0;border-top:1px solid var(--line);margin:14px 0}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>

<header>
  <div>
    <div class="h-title">SUB<span>-20</span></div>
    <div class="h-sub" id="h-sub"></div>
  </div>
  <button class="h-gear" id="btn-gear" aria-label="Podešavanja">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.11-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.65 8.9a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.01A1.7 1.7 0 0 0 10.05 3V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.01c.26.63.87 1.03 1.56 1.03H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51.98z"/></svg>
  </button>
</header>

<main>
  <section class="page" id="pg-danas"></section>
  <section class="page" id="pg-plan"></section>
  <section class="page" id="pg-prog"></section>
  <section class="page" id="pg-koleno"></section>
  <section class="page" id="pg-pred"></section>
</main>

<div class="backdrop" id="backdrop"></div>
<div class="sheet" id="sheet"></div>

<nav id="tabbar">
  <button data-pg="danas" class="on">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><rect x="3.5" y="5" width="17" height="15.5" rx="3"/><path d="M3.5 9.5h17M8 3v3.5M16 3v3.5"/><circle cx="12" cy="15" r="2.4" fill="currentColor" stroke="none"/></svg>
    <span>Danas</span>
  </button>
  <button data-pg="plan">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M8.5 6h11M8.5 12h11M8.5 18h11"/><circle cx="4.4" cy="6" r="1.4" fill="currentColor" stroke="none"/><circle cx="4.4" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="4.4" cy="18" r="1.4" fill="currentColor" stroke="none"/></svg>
    <span>Plan</span>
  </button>
  <button data-pg="prog">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1"><path d="M12 3a9 9 0 1 1-9 9" stroke-linecap="round"/><path d="M12 7.5a4.5 4.5 0 1 1-4.5 4.5" stroke-linecap="round" opacity=".55"/></svg>
    <span>Progres</span>
  </button>
  <button data-pg="koleno">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2.2-5 3.6 10 2.2-5H21"/></svg>
    <span>Koleno</span>
  </button>
  <button data-pg="pred">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M5 21V4"/><path d="M5 4h13l-2.5 4L18 12H5"/></svg>
    <span>Trka</span>
  </button>
</nav>

<script>
'use strict';
/* ============ KONSTANTE PLANA — izvor: Plan_SUB-19_5K_v5.xlsx (doslovno) ============ */
const START='2026-06-22', RACE='2026-09-24', SCHEMA=5, LS_KEY='sub19-v1';
const APP_VERSION='29'; /* mora se poklapati sa APP_VERSION u sw.js */
const ANALYZE_SECRET='acavolimasunajvisenasvetu123456789'; /* usklađeno sa APP_SHARED_SECRET na Vercel-u. NIJE prava tajna (vidljivo u kodu) — samo prag protiv slučajnog trošenja kvote */
const STRAVA_CLIENT_ID='259960';
const CILJ='19:20–19:30', CILJ_TEMPO='3:52–3:54 /km';

/* ============ POMOĆNE (čiste funkcije) ============ */
const pad2=n=>String(n).padStart(2,'0');
function s2d(s){const[a,b,c]=s.split('-').map(Number);return new Date(a,b-1,c);}
function d2s(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
function addD(s,n){const d=s2d(s);d.setDate(d.getDate()+n);return d2s(d);}
function diffD(a,b){return Math.round((s2d(b)-s2d(a))/86400000);}
function todayStr(){return d2s(new Date());}
const DOW=['Pon','Uto','Sre','Čet','Pet','Sub','Ned'];
function dowOf(s){return DOW[(s2d(s).getDay()+6)%7];} /* naziv dana IZ DATUMA — ispravno i posle zamene dana (d.dow ostaje izvorna pozicija, ne prati swap) */
const DOWL=['ponedeljak','utorak','sreda','četvrtak','petak','subota','nedelja'];
const MES=['januara','februara','marta','aprila','maja','juna','jula','avgusta','septembra','oktobra','novembra','decembra'];
function fmtD(s){const d=s2d(s);return pad2(d.getDate())+'.'+pad2(d.getMonth()+1)+'.';}
function fmtDL(s){const d=s2d(s);const wd=(d.getDay()+6)%7;return DOWL[wd].charAt(0).toUpperCase()+DOWL[wd].slice(1)+', '+d.getDate()+'. '+MES[d.getMonth()];}
function fmtNum(n,dec=1){const v=(Math.round(n*10**dec)/10**dec).toFixed(dec).replace(/\.?0+$/,'');return v.replace('.',',');}
function fmtKm(n){return fmtNum(n,1);}
function fmtClock(sec){sec=Math.round(sec);const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;return h?h+':'+pad2(m)+':'+pad2(s):m+':'+pad2(s);}
function fmtTempo(sec){if(sec==null||!isFinite(sec))return'—';return fmtClock(sec);}
function parseTimeStr(str){
  if(!str)return null;
  const s=String(str).trim().replace(/[,.]/g,':');
  if(/^\d{3,6}$/.test(s)){ /* samo cifre: 433=4:33, 4233=42:33, 10203=1:02:03 */
    const se=+s.slice(-2);if(se>59)return null;
    const rest=s.slice(0,-2);
    if(rest.length<=2)return(+rest)*60+se;
    const mi=+rest.slice(-2);if(mi>59)return null;
    return(+rest.slice(0,-2))*3600+mi*60+se;
  }
  const m=s.match(/^(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?$/);
  if(!m)return null;
  let h=0,mi,se;
  if(m[3]!=null){h=+m[1];mi=+m[2];se=+m[3];}else{mi=+m[1];se=+m[2];}
  if(se>59||mi>(m[3]!=null?59:99))return null;
  return h*3600+mi*60+se;
}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
/* Riegel: T2 = T1 × (5 / Q)^1.06 */
function riegel(tempoSec,q){return tempoSec*q*Math.pow(5/q,1.06);}

/* ===== Daniels-Gilbert VDOT (za rekalibraciju forme) =====
   VDOT se računa iz Riegel-ekvivalent-5K-vremena kvalitetne sesije,
   konzistentno sa predikcijom. Plan NE prati čist VDOT→zona mapiranje
   (plan gradi od trenutne forme ~20:40 ka cilju 19:30 ≈ VDOT 51.1; ne ka trenutnom
   PB ≈ VDOT 48), zato zonske tempove ne izvodimo iz VDOT-a. */
function vo2(tMin){ return 0.8+0.1894393*Math.exp(-0.012778*tMin)+0.2989558*Math.exp(-0.1932605*tMin); }
function vdotFromRace(distM,sec){
  const tMin=sec/60, v=distM/tMin;
  const vo2max=(-4.60+0.182258*v+0.000104*v*v);
  return vo2max/vo2(tMin);
}
function vdotFrom5k(sec){ return vdotFromRace(5000,sec); }
/* VDOT iz kvalitetne sesije: ostvaren tempo + dužina Q-segmenta -> Riegel 5K -> VDOT */
function vdotFromQuality(paceSec,qKm){ return vdotFrom5k(riegel(paceSec,qKm)); }

/* ============ IZVEDENE STRUKTURE PLANA ============ */
const BY_ID={},BY_DATE={},DATED=[];
/* Gradi/prepravlja BY_DATE i DATED prema TRENUTNOM S.moves (zamena dana).
   d.origDate = nepromenljiva izvorna pozicija iz plana (postavlja se JEDNOM).
   d.date = efektivni datum (original, osim ako je dan pomeren preko S.moves).
   POZIV: (a) jednom odmah posle učitavanja S (S mora postojati — vidi ispod),
   (b) posle svakog swapDays(), (c) posle undoWeekMoves(). Zbog toga što ovo
   MUTIRA d.date na istom objektu, sav ostali kod (sync, kartice, kalendar)
   automatski vidi efektivni raspored bez ijedne dodatne izmene. */
function rebuildDateIndex(){
  for(const k in BY_DATE) delete BY_DATE[k];
  DATED.length=0;
  PLAN.forEach(w=>{w.days.forEach(d=>{
    d.week=w;
    BY_ID[d.id]=d;
    /* originali iz plana — snimaju se JEDNOM i nikad se ne menjaju.
       Sentinel _orig, jer d.tag za dan odmora legitimno JESTE undefined. */
    if(!d._orig){d._orig=1;d.origTag=d.tag;d.origKm=d.km;d.origDesc=d.desc;d.origRest=!!d.rest;}
    /* izmena tipa treninga (S.alts). 'odmor' je poseban: plan ga nosi kao
       rest:true bez oznake, pa ga tako i vraćamo. */
    const ov=S.alts&&S.alts[d.id];
    if(ov){
      d.rest=ov.tag==='odmor';
      d.tag=d.rest?undefined:ov.tag;
      d.km=d.rest?null:(ov.km!=null?ov.km:null);
      d.desc=ov.desc;
    } else {
      d.tag=d.origTag;d.rest=d.origRest;d.km=d.origKm;d.desc=d.origDesc;
    }
    if(!d.test){
      if(!d.origDate) d.origDate=addD(w.start,d.dow);
      d.date=(S.moves&&S.moves[d.id])||d.origDate;
      BY_DATE[d.date]=d; DATED.push(d);
    }
  });});
  DATED.sort((a,b)=>a.date<b.date?-1:1);
  /* MORA posle primene S.alts — dan pretvoren u odmor menja ukupan broj treninga */
  TOTAL_TR=PLAN.reduce((n,w)=>n+w.days.filter(d=>!d.rest).length,0);
}
/* Zamena dva dana unutar ISTE nedelje. Odbija: nepostojeći/test dan, različite
   nedelje, ili ako je BILO KOJI od dva dana već odrađen (istorija se ne diraj).
   Ako se dan vrati na svoju izvornu poziciju, brišemo ga iz S.moves (drži mapu
   čistom — dvostruki swap A↔B pa opet A↔B ostavlja S.moves prazan). */
function swapDays(idA,idB){
  const a=BY_ID[idA], b=BY_ID[idB];
  if(!a||!b||a.test||b.test) return {ok:false,err:'nepostojeći dan'};
  if(a.week!==b.week) return {ok:false,err:'van iste nedelje'};
  const done=id=>S.log[id]&&S.log[id].status==='done';
  if(done(idA)||done(idB)) return {ok:false,err:'odrađen dan se ne pomera'};
  const dA=a.date, dB=b.date;
  S.moves=S.moves||{};
  if(dB===a.origDate) delete S.moves[idA]; else S.moves[idA]=dB;
  if(dA===b.origDate) delete S.moves[idB]; else S.moves[idB]=dA;
  rebuildDateIndex(); save();
  return {ok:true};
}
/* Izmena tipa treninga za jedan dan (S.alts). Isti obrazac kao S.moves:
   ako je izmena identična planu, unos se briše — mapa ostaje čista, a "vrati
   na plan" je prirodan. Odrađeni dani se ne menjaju (istorija se ne prepisuje). */
function altDescTemplate(tag,km){
  const k=km!=null&&km!==''?fmtKm(km)+' km ':'';
  return {lako:k+'lako (Z2)', lr:k+'LR (Z2)', int:'Intervali — unesi strukturu',
          tempo:'Tempo — unesi strukturu', snaga:'Snaga / mobilnost', odmor:'Odmor'}[tag]||'';
}
function setAlt(id,alt){
  const d=BY_ID[id];
  if(!d||d.test)return {ok:false,err:'nepostojeći dan'};
  if(S.log[id]&&S.log[id].status==='done')return {ok:false,err:'odrađen trening se ne menja'};
  if(!alt||!alt.tag)return {ok:false,err:'tip nije izabran'};
  S.alts=S.alts||{};
  const planTag=d.origRest?'odmor':d.origTag;
  const km=alt.tag==='odmor'?null:(alt.km!=null&&alt.km!==''&&!isNaN(alt.km)?+alt.km:null);
  const desc=alt.tag==='odmor'?'Odmor':(alt.desc||'');
  /* identično planu → briši unos umesto da ga čuvaš */
  if(alt.tag===planTag && km===(d.origKm!=null?d.origKm:null) && desc===(d.origDesc||(d.origRest?'Odmor':''))){
    delete S.alts[id];
  } else {
    S.alts[id]={tag:alt.tag,km:km,desc:desc};
  }
  rebuildDateIndex();save();
  return {ok:true};
}
function clearAlt(id){
  if(!S.alts||S.alts[id]==null)return false;
  delete S.alts[id];rebuildDateIndex();save();return true;
}
/* Vraća SVE dane jedne nedelje na izvorni raspored iz plana (briše njihove
   S.moves unose). Pojedinačni undo jednog dana bi ostavio nekonzistentan par,
   zato je undo uvek na nivou cele nedelje. */
function undoWeekMoves(w){
  if(!S.moves)return false;
  let changed=false;
  w.days.forEach(d=>{ if(!d.test && S.moves[d.id]!=null){ delete S.moves[d.id]; changed=true; } });
  if(changed){ rebuildDateIndex(); save(); }
  return changed;
}

function weekPlanKm(w){return w.days.reduce((s,d)=>s+(d.km||0),0);}
function weekOf(dateStr){for(const w of PLAN){const end=addD(w.start,6);if(dateStr>=w.start&&dateStr<=end)return w;}return null;}

function migrate(o){
  if(!o||typeof o!=='object')return null;
  if(!o.log)return null;
  o.v=o.v||1;
  if(o.v<2){o.strava=o.strava||null;o.predLock=o.predLock||{};o.v=2;} /* v1→v2: Strava sync polja — postojeći unosi se NIKAD ne brišu */
  if(o.v<3){o.vdotLog=o.vdotLog||[];o.v=3;} /* v2→v3: VDOT istorija forme — postojeći unosi netaknuti */
  if(o.v<4){o.moves=o.moves||{};o.v=4;} /* v3→v4: zamena dana (swap) — postojeći raspored netaknut (prazna mapa = sve na originalnim mestima) */
  if(o.v<5){o.alts=o.alts||{};o.v=5;} /* v4→v5: izmena tipa treninga — prazna mapa = svi dani po planu */
  o.knee=o.knee||[];o.kg=o.kg||[];o.pred=o.pred||{};o.vdotLog=o.vdotLog||[];o.moves=o.moves||{};o.alts=o.alts||{};o.ui=Object.assign({firstRun:null,lastBackup:null,snooze:null,seenWeek:null},o.ui||{});
  o.v=SCHEMA;
  return o;
}

function stFor(id){const l=S.log[id];return l&&l.status?l.status:'pending';}
function realKmDay(d){const l=S.log[d.id];if(!l||l.status!=='done')return 0;return l.km!=null?l.km:(d.km||0);}
function weekRealKm(w){return w.days.reduce((s,d)=>s+realKmDay(d),0);}
function weekDone(w){return w.days.filter(d=>!d.rest&&stFor(d.id)==='done').length;}
function weekCountable(w){return w.days.filter(d=>!d.rest).length;}
function totalDone(){return PLAN.reduce((n,w)=>n+weekDone(w),0);}
function streak(today){
  let cur=today,n=0;
  const t=BY_DATE[today];
  if(t&&!t.rest&&stFor(t.id)!=='done')cur=addD(today,-1);
  while(cur>=START){
    const d=BY_DATE[cur];
    if(!d){if(cur>RACE){cur=addD(cur,-1);continue;}break;}
    if(d.rest){n++;}
    else if(stFor(d.id)==='done'){n++;}
    else break;
    cur=addD(cur,-1);
  }
  return n;
}
function kneeStatus(today){
  const from=addD(today,-6);
  const win=S.knee.filter(k=>k.date>=from&&k.date<=today);
  const mx=win.reduce((m,k)=>Math.max(m,k.pain),0);
  const ge3=win.filter(k=>k.pain>=3).length;
  if(ge3>=3)return{cls:'stop',t:'FIZIJATAR',s:'3+ dana sa bolom ≥3 u poslednjih 7 dana — zakaži pregled.'};
  if(mx>=6)return{cls:'stop',t:'STANI',s:'Bol 6+ u poslednjih 7 dana. Pravilo iz plana: stani.'};
  if(mx>=3)return{cls:'warn',t:'PAZI',s:'Bol 3–5 u poslednjih 7 dana. Prati i smanji ako raste.'};
  return{cls:'ok',t:'Koleno OK',s:'0 = bez bola · 3–5 = pazi · 6+ = stani · 3+ dana ≥3 u 7 dana = fizijatar'};
}
function predCalc(){
  const rows=PRED.map(r=>{const a=S.pred[r.id];return{r,a,pred:a?riegel(a,r.q):null};});
  const entered=rows.filter(x=>x.pred!=null);
  const last=entered.length?entered[entered.length-1]:null;
  const best=entered.length?entered.reduce((m,x)=>x.pred<m.pred?x:m):null;
  return{rows,entered,last,best};
}
/* ===== VDOT rekalibracija forme ===== */
function currentVdot(){
  const vl=S.vdotLog||[];
  return vl.length?vl[vl.length-1].vdot:null;
}
function baselineVdot(){ /* početni VDOT iz PB (20:37) — referenca */
  return Math.round(vdotFrom5k(1237)*10)/10;
}
/* Zabeleži VDOT iz kvalitetne sesije. Vraća {vdot, prev, delta, dir} ili null.
   Prigušenje: jedna sesija je šum — pomeramo VDOT samo delimično ka izmerenom. */
function recordVdot(predId, paceSec, dateOverride){
  const r=PRED.find(x=>x.id===predId);
  if(!r||!paceSec)return null;
  const measured=Math.round(vdotFromQuality(paceSec,r.q)*10)/10;
  const prev=currentVdot()!=null?currentVdot():baselineVdot();
  /* prigušenje 40%: pomeri 40% puta ka izmerenom (jedna sesija ne pomera VDOT skroz) */
  const smoothed=Math.round((prev+(measured-prev)*0.4)*10)/10;
  const delta=Math.round((smoothed-prev)*10)/10;
  const entry={id:predId, ts:dateOverride||TODAY, measured, vdot:smoothed, prev, delta};
  S.vdotLog=S.vdotLog||[];
  /* ako već postoji unos za ovu sesiju, zameni ga (ne dupliraj) */
  const ix=S.vdotLog.findIndex(e=>e.id===predId);
  if(ix>=0)S.vdotLog.splice(ix,1);
  S.vdotLog.push(entry);
  return {vdot:smoothed, prev, delta, dir: delta>0.05?'up':delta<-0.05?'down':'flat', measured};
}
/* Uskladi datume VDOT istorije sa PRAVIM datumima trčanja (runDate iz Strave).
   VDOT unosi nastali pre v20 nose datum sinhronizacije umesto datuma trčanja,
   a sync ih ne prepravlja (preskače već povučene treninge radi štednje kvote).
   Ovo ih ispravi direktno: id sesije -> dan u planu -> runDate. Idempotentno. */
function fixVdotDates(){
  if(!Array.isArray(S.vdotLog)||!S.vdotLog.length)return false;
  const p2d={};
  DATED.forEach(d=>{ predRowsFor(d).forEach(pid=>{ if(!(pid in p2d))p2d[pid]=d.id; }); });
  let changed=false;
  S.vdotLog.forEach(e=>{
    const did=p2d[e.id]; if(!did)return;
    const l=S.log[did]; if(!l)return;
    const real=l.runDate||null;
    if(real&&e.ts!==real){ e.ts=real; changed=true; }
  });
  if(changed) S.vdotLog.sort((a,b)=>a.ts<b.ts?-1:a.ts>b.ts?1:0);
  return changed;
}
function backupDue(today){
  const base=S.ui.lastBackup||S.ui.firstRun;
  if(!base)return false;
  if(S.ui.snooze&&today<S.ui.snooze)return false;
  return today>=addD(base,7);
}

const QS={
 n1d3:[4000],n2d3:[800],n2d5:[2000],n3d3:[1000],n3d5:[2500],n4d3:[1000],n4d5:[2000],
 n5d3:[1000],n5d5:[3000],n6d3:[1000],n6d5:[4000,2000],n8d3:[1000],n8d5:[6000],n9d3:[1000],
 n9d5:[6000],n10d3:[1000],n10d5:[3000],n11d3:[1500],n11d5:[6000],n12d3:[2000],
 n12d5:[4000],n13d3:[400],n13d5:[3000],n14d2:[200]
};
function predRowFor(d){
  if(d.tag!=='int'&&d.tag!=='tempo')return null;
  const c=PRED.filter(r=>r.w===d.week.w&&(d.tag==='int'?r.l.includes('Intervali'):(r.l.includes('Tempo')||r.l.includes('Ritam'))));
  return c.length?c[0].id:null;
}
/* sve predikcijske sesije za dan (dan tag određuje tip: int->Intervali, tempo->Tempo/Ritam) */
function predRowsFor(d){
  if(d.tag!=='int'&&d.tag!=='tempo')return [];
  const rows=PRED.filter(r=>r.w===d.week.w&&(d.tag==='int'?r.l.includes('Intervali'):(r.l.includes('Tempo')||r.l.includes('Ritam')))).map(r=>r.id);
  if(!rows.length)return [];
  /* SUDAR: izmenom tipa u nedelji može nastati VIŠE dana istog kvaliteta, a
     predikcijski red je jedan. Bez ovoga bi dva dana pisala u isti VDOT unos.
     Pravilo: pravo polaže dan koji je i PO PLANU tog tipa. Ako je taj izmenjen
     (npr. interval pretvoren u lagano), pravo prelazi na hronološki prvi dan
     tog tipa — tako zamena kvalitetnog dana radi prirodno. */
  const same=d.week.days.filter(x=>!x.test&&x.tag===d.tag);
  if(same.length<=1)return rows;
  const orig=same.filter(x=>x.origTag===d.tag);
  const pool=orig.length?orig:same.slice().sort((a,b)=>(a.date||'')<(b.date||'')?-1:1);
  return pool[0]===d?rows:[];
}
/* VDOT delta prikaz za jedan radni segment (gore/dole u odnosu na prethodni VDOT) */
function vdotDeltaHTML(predId,paceSec){

function pickClosest(list,planKm){
  return list.reduce((b,x)=>Math.abs(x.distance/1000-planKm)<Math.abs(b.distance/1000-planKm)?x:b);
}
/* Zajednička selekcija radnih lapova (varijanta C sa zaštitom) — koriste je i
   workLapsTempo (za VDOT) i workLapsDetail (za po-krug analizu). Radni intervali
   su NAJBRŽI lapovi ciljane distance i međusobno konzistentni; WU/CD/hod su iste
   distance ali dramatično sporiji. Sidro = najbrži lap, zadrži unutar 25%. */
function workLapsSelect(laps,specs){
  if(!laps||!laps.length)return [];
  const paceOf=L=>((L.moving_time||L.elapsed_time)/(L.distance/1000));
  const cand=laps.filter(L=>L.distance>0&&(L.moving_time||L.elapsed_time)>0
    && specs.some(m=>Math.abs(L.distance-m)/m<=0.15));
  if(!cand.length)return [];
  const fastest=Math.min(...cand.map(paceOf));
  return cand.filter(L=>paceOf(L)<=fastest*1.25);
}
function workLapsTempo(laps,specs){
  const work=workLapsSelect(laps,specs);
  if(!work.length)return null;
  const dist=work.reduce((s,L)=>s+L.distance,0);
  const t=work.reduce((s,L)=>s+(L.moving_time||L.elapsed_time||0),0);
  if(!dist||!t)return null;
  return Math.round(t/(dist/1000));
}
/* Prepoznavanje RADNIH SEGMENATA direktno iz streamova po brzini — nezavisno
   od Stravinih lapova (koji nepouzdano vraćaju čas strukturne čas auto-1km).
   Validirano na stvarnim trening strukturama: 5x1km intervali (±4s po repu),
   2x2.5km tempo (±4s), nula lažnih segmenata na lakom trčanju i stridovima. */
function detectWorkSegments(streams){
  const dist = streams.distance && streams.distance.data;
  const time = streams.time && streams.time.data;
  const hr   = streams.heartrate && streams.heartrate.data;
  const cad  = streams.cadence && streams.cadence.data;
  const wat  = streams.watts && streams.watts.data;
  if(!Array.isArray(dist)||!Array.isArray(time)||dist.length<120||dist.length!==time.length) return null;
  const n=dist.length;

  /* 1) brzina po tački, klizni prozor ±7 tačaka (~15 s) protiv GPS šuma.
     NAPOMENA: 7 je inženjerski izbor kalibrisan na stvarnim podacima, ne merena konstanta. */
  const W=7;
  const v=new Array(n);
  for(let i=0;i<n;i++){
    const a=Math.max(0,i-W), b=Math.min(n-1,i+W);
    const dd=dist[b]-dist[a], dt=time[b]-time[a];
    v[i]=dt>0?dd/dt:0;
  }

  /* 2) k-means na brzinama (samo kretanje >0.7 m/s).
     Trčanje sa intervalima ima do TRI moda brzine: hod (oporavak), easy džog
     (WU/CD), rad. k=2 bi povukao prag između hoda i džoga — pa koristimo k=3
     i prag stavljamo između SREDNJEG i NAJBRŽEG centra. Ako k=3 ne razdvoji
     (nema easy moda), fallback na k=2. Pragovi separacije (1.25 / 1.4) su
     inženjerski izbori validirani na stvarnim trening strukturama, ne merene konstante. */
  const mv=v.filter(x=>x>0.7);
  if(mv.length<120) return null;
  function kmeans(K){
    const mn=Math.min(...mv), mx=Math.max(...mv);
    let c=[]; for(let k=0;k<K;k++)c.push(mn+(mx-mn)*k/(K-1));
    for(let it=0;it<60;it++){
      const s=new Array(K).fill(0), cnt=new Array(K).fill(0);
      for(const x of mv){
        let bi=0,bd=Infinity;
        for(let k=0;k<K;k++){const d=Math.abs(x-c[k]);if(d<bd){bd=d;bi=k;}}
        s[bi]+=x;cnt[bi]++;
      }
      let moved=false;
      for(let k=0;k<K;k++){ if(cnt[k]){const nc=s[k]/cnt[k];if(Math.abs(nc-c[k])>=0.005)moved=true;c[k]=nc;} }
      if(!moved)break;
    }
    return c.sort((a,b)=>a-b);
  }
  let thr=null;
  const c3=kmeans(3);
  if(c3[2]/c3[1]>=1.25){ thr=(c3[1]+c3[2])/2; }
  else {
    const c2k=kmeans(2);
    if(c2k[1]/c2k[0]>=1.4){ thr=(c2k[0]+c2k[1])/2; }
  }
  if(thr==null) return []; /* kontinuirano trčanje — nema jasnog radnog moda */

  /* 4) maska radnih tačaka + spajanje rupa <=8 s (kratki padovi unutar repa) */
  const work=v.map(x=>x>=thr);
  let i=0;
  while(i<n){
    if(!work[i]){
      let j=i; while(j<n&&!work[j])j++;
      if(i>0&&j<n){ const gap=time[j]-time[i-1]; if(gap<=8){ for(let k=i;k<j;k++)work[k]=true; } }
      i=Math.max(j,i+1);
    } else i++;
  }

  /* 5) segmenti: odbaci kraće od 200 m ili 45 s (stridovi/šum nisu repovi) */
  const segs=[];
  i=0;
  while(i<n){
    if(work[i]){
      let j=i; while(j<n&&work[j])j++;
      const dd=dist[j-1]-dist[i], dt=time[j-1]-time[i];
      if(dd>=200&&dt>=45){
        const avg=(arr)=>{ if(!arr)return null; let s=0,c=0; for(let k=i;k<j&&k<arr.length;k++){ const x=arr[k]; if(x!=null&&x>0){s+=x;c++;} } return c?s/c:null; };
        segs.push({
          i:segs.length+1,
          distM:Math.round(dd),
          paceSec:Math.round(dt/(dd/1000)),
          avgHr:avg(hr)!=null?Math.round(avg(hr)):null,
          cadence:avg(cad)!=null?Math.round(avg(cad)):null,
          watts:avg(wat)!=null?Math.round(avg(wat)):null
        });
      }
      i=j;
    } else i++;
  }
  return segs;
}

/* Po-kilometarski presek za KONTINUIRANA trčanja (lako/LR) — nema radnih
   intervala, pa merimo puls/kadencu/tempo svakog kilometra kroz celo trčanje.
   Iz distance streama nalazimo gde svaki km počinje/završava, pa prosečimo HR i
   kadencu unutar tog opsega. Vraća niz {km, paceSec, hr, cadence}. */
function perKmDetail(streams){
  if(!streams)return [];
  const dist=streams.distance&&streams.distance.data, hr=streams.heartrate&&streams.heartrate.data,
        cad=streams.cadence&&streams.cadence.data, time=streams.time&&streams.time.data;
  if(!Array.isArray(dist)||!dist.length)return [];
  const out=[]; let kmIdx=1, startI=0;
  for(let i=0;i<dist.length;i++){
    if(dist[i]>=kmIdx*1000){
      const seg=(arr)=>{ if(!arr)return null; let s=0,n=0; for(let k=startI;k<=i&&k<arr.length;k++){if(arr[k]!=null){s+=arr[k];n++;}} return n?s/n:null; };
      const dt=(time&&time[i]!=null&&time[startI]!=null)?(time[i]-time[startI]):null;
      out.push({km:kmIdx, paceSec: dt!=null?Math.round(dt):null, hr: seg(hr)!=null?Math.round(seg(hr)):null, cadence: seg(cad)!=null?Math.round(seg(cad)):null});
      startI=i; kmIdx++;
    }
  }
  return out;
}
/* Po-krug podaci radnih intervala za LLM analizu (tempo, puls, kadenca, watts po krugu).
   VAŽNO: Strava /laps NE vraća puls po krugu (average_heartrate), ali vraća
   average_cadence i average_watts (imena polja su average_*, ne avg_*). Puls po
   krugu se povlači iz HR streama i mapira preko start_index/end_index u stravaSync. */
function workLapsDetail(laps,specs,hrByLap){
  const work=workLapsSelect(laps,specs);
  return work.map((L,i)=>({
    i:i+1,
    paceSec:Math.round((L.moving_time||L.elapsed_time)/(L.distance/1000)),
    avgHr:(hrByLap&&hrByLap[i]!=null)?Math.round(hrByLap[i]):null,
    cadence:L.average_cadence!=null?Math.round(L.average_cadence):null,
    watts:L.average_watts!=null?Math.round(L.average_watts):null
  }));
}

  });

      const pid=inp.dataset.wpin;

    };
    inp.addEventListener('input',wh);
    inp.addEventListener('change',wh);
  });
  /* AI analiza — šalje SAMO podatke koje app već ima (nema novog Strava poziva) */
  const aiBtn=g.querySelector(`#ai-go-${d.id}`);

    aiBtn.addEventListener('click',async()=>{
      const out=g.querySelector(`#ai-out-${d.id}`);

        return;

      const predIds=predRowsFor(d);
      const mainPid=predIds[0];
      const r=mainPid?PRED.find(x=>x.id===mainPid):null;
      const payload={
        session:{ desc:d.desc||'', planPace: r?fmtTempo(r.pt):'—', q: r?r.q:null, tag:d.tag },
        entered:{
          workPace: mainPid&&S.pred[mainPid]?fmtTempo(S.pred[mainPid]):null,
          km:l.km??null, time:l.sec?fmtClock(l.sec):null,
          hr:l.hr??null, rpe:l.rpe??null, note:l.note||'',
          laps: Array.isArray(l.laps)&&l.laps.length?l.laps:null,
          perKm: Array.isArray(l.perKm)&&l.perKm.length?l.perKm:null
        }

      try{
        const resp=await fetch('/api/analyze',{
          method:'POST',
          headers:{'Content-Type':'application/json','x-app-secret':ANALYZE_SECRET},
          body:JSON.stringify(payload)
        });
        let data;
        try{ data=await resp.json(); }
        catch{
          out.className='ai-out err';
          out.textContent='Server nije vratio ispravan odgovor (HTTP '+resp.status+'). Najverovatnije api/analyze.js još nije deployovan na Vercel-u — proveri da li je fajl commit-ovan i da je deploy završen.';
          return;
        }
        if(!resp.ok){ out.className='ai-out err'; out.textContent='Greška ('+resp.status+'): '+(data.error||'nepoznata'); }
        else { out.textContent=data.text; l.aiCount=(l.aiCount||0)+1; save(); }

        out.className='ai-out err'; out.textContent='Pravi mrežni prekid (offline / nema signala).';
      }finally{
        aiBtn.disabled=false; aiBtn.textContent='🤖 Analiziraj trening (AI)';
      }
    });
  }

const ALT_TYPES=[['lako','Lako'],['int','Intervali'],['tempo','Tempo'],['lr','Dugo'],['snaga','Snaga'],['odmor','Odmor']];
function altSheetHTML(d){

  h+=`<div class="f-field full"><label>Tip treninga</label>${segBtns(ALT_TYPES.slice(0,3))}${segBtns(ALT_TYPES.slice(3))}</div>`;

function readAltFields(sh){
  const k=sh.querySelector('#alt-km'), t=sh.querySelector('#alt-desc');

function openAltSheet(id){
  const d=BY_ID[id];if(!d)return;

function renderAltSheet(d){
  openSheet(altSheetHTML(d));
  ALT_ERR='';

  sh.querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{

/* ---------- POMERANJE TRENINGA (centralni ekran, cela nedelja odjednom) ----------
   Dodir prvog dana ga izabere, dodir drugog im zameni mesta. Odrađeni dani su
   zaključani (istorija se ne pomera). NE koristi <select> — CSS mu skida native
   strelicu (appearance:none), pa nema vidljivog znaka da je dodirljiv. */
let SWAP_SEL=null, SWAP_ERR='';
function weekSwapHTML(w){
  const doneId=id=>S.log[id]&&S.log[id].status==='done';
  const days=w.days.filter(x=>!x.test).slice().sort((a,b)=>{
    const da=a.date||'9999-99-99', db=b.date||'9999-99-99';
    return da<db?-1:da>db?1:0;
  });
  const moved=w.days.some(x=>!x.test&&S.moves&&S.moves[x.id]!=null);
  const selD=SWAP_SEL?BY_ID[SWAP_SEL]:null;
  let h=`<div class="sh-t">Pomeranje treninga · N${w.w}</div>
    <div class="sh-s">${selD?`Izabrano: ${dowOf(selD.date)} ${fmtD(selD.date)} — dodirni dan sa kojim menja mesto`:'Dodirni dan koji hoćeš da pomeriš'}</div>`;
  if(SWAP_ERR)h+=`<div style="font-size:.75rem;color:var(--red);margin-bottom:10px">${esc(SWAP_ERR)}</div>`;
  h+=`<div class="swap-list">`;
  days.forEach(d=>{
    const locked=doneId(d.id), sel=SWAP_SEL===d.id, tag=locked?'div':'button';
    const title=d.rest?(d.desc||'Odmor'):d.desc.split('\n')[0];
    h+=`<${tag} class="day${sel?' swap-sel':''}${locked?' swap-lock':''}"${locked?'':` data-swd="${d.id}"`}>
      <div class="day-d">${dowOf(d.date)}<small>${fmtD(d.date)}</small></div>
      <div class="day-t" style="${d.rest?'color:var(--txt3)':''}">${esc(title)}${S.moves&&S.moves[d.id]!=null?`<small>pomeren sa ${fmtD(d.origDate)}</small>`:''}</div>
      <div class="day-km">${d.km!=null?fmtKm(d.km):''}</div>
      <span class="st ${locked?'done':sel?'skip':'pending'}">${locked?'✓':sel?'⇄':'○'}</span>
    </${tag}>`;
  });
  h+=`</div>`;
  if(moved)h+=`<div class="btnrow" style="margin-top:14px"><button class="btn ghost" id="swap-undo">Vrati raspored nedelje na plan</button></div>`;
  h+=`<div class="note-src">Odrađeni dani (✓) se ne pomeraju — istorija ostaje netaknuta. Zamena je moguća unutar iste nedelje.</div>`;
  return h;
}
function openWeekSwap(wNum){
  const w=PLAN.find(x=>x.w===wNum);
  if(!w)return;
  SWAP_SEL=null;SWAP_ERR='';
  renderWeekSwap(w);
}
function renderWeekSwap(w){
  openSheet(weekSwapHTML(w));
  SWAP_ERR=''; /* greška se prikaže jednom, pa se čisti pri sledećem crtanju */
  const sh=$('#sheet');
  sh.querySelectorAll('[data-swd]').forEach(b=>b.onclick=()=>{
    const id=b.dataset.swd;
    if(!SWAP_SEL){SWAP_SEL=id;renderWeekSwap(w);return;}      /* prvi dodir: izbor */
    if(SWAP_SEL===id){SWAP_SEL=null;renderWeekSwap(w);return;} /* isti dan: poništi izbor */
    const res=swapDays(SWAP_SEL,id);                           /* drugi dodir: zamena */
    SWAP_SEL=null;
    if(!res.ok)SWAP_ERR='Zamena nije uspela: '+(res.err||'nepoznata greška');
    renderWeekSwap(w);
  });
  const undo=sh.querySelector('#swap-undo');
  if(undo)undo.onclick=()=>{
    if(!confirm('Vratiti sve pomerene dane ove nedelje na originalni raspored iz plana?'))return;
    undoWeekMoves(w);SWAP_SEL=null;renderWeekSwap(w);
  };
}
function openDaySheet(id){
  const d=BY_ID[id],s=stFor(id);

  openSheet(`

    <div class="sh-s">${tagName(isRest?'odmor':d.tag)}${d.km!=null?' · plan '+fmtKm(d.km)+' km':''}${S.alts&&S.alts[id]?' · izmenjen':''}</div>

    ${d.test?'':`<div class="btnrow" style="margin-top:12px"><button class="btn ghost" id="alt-open">✏️ Izmeni trening</button></div>`}
    ${!isRest&&S.log[id]?`<div class="btnrow"><button class="btn danger" id="del-log">Obriši unos</button></div>`:''}
    <div class="note-src">Sve izmene se čuvaju automatski.</div>
  `);

  const altOpen=sh.querySelector('#alt-open');

  if(isRest)return; /* dan odmora nema formu ni status */
  bindForm(sh,d);
  sh.querySelectorAll('#seg button').forEach(b=>b.onclick=()=>{
    const l=S.log[id]||(S.log[id]={});
    l.status=b.dataset.s;
    if(b.dataset.s==='done'&&!l.ts)l.ts=d.date||TODAY;
    save();
    sh.querySelectorAll('#seg button').forEach(x=>x.classList.toggle('on',x===b));
    if(b.dataset.s==='done')donePop();
  });
  const del=sh.querySelector('#del-log');
  if(del)del.onclick=()=>{
    if(!confirm('Obriši sve unete podatke za ovaj trening?'))return;
    delete S.log[id];
    S.knee=S.knee.filter(k=>k.src!==id);
    S.kg=S.kg.filter(k=>k.src!==id);
    save();closeSheet();
  };
}

/* ---------- PROGRES ---------- */
function svgW(w,h,inner){return `<svg class="chart" viewBox="0 0 ${w} ${h}">${inner}</svg>`;}
function renderProg(){

  const w=weekOf(TODAY)||(TODAY<START?PLAN[0]:PLAN[13]);
  const pk=weekPlanKm(w),rk=weekRealKm(w),dn=weekDone(w),ct=weekCountable(w);
  const c1=2*Math.PI*62,c2=2*Math.PI*42;

  el.innerHTML=`
  <div class="card">

        <circle class="ring-track" cx="75" cy="75" r="42" stroke="var(--green)"/>
        <circle class="ring-val" cx="75" cy="75" r="42" stroke="var(--green)" stroke-dasharray="${c2}" stroke-dashoffset="${c2}" data-off="${c2*(1-f2)}"/>
      </svg>

        <div class="rl"><span style="color:var(--green)">TRENINZI</span><b>${dn} / ${ct}</b></div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-t">Ispunjenost plana</div>
    <div class="big" style="font-size:2.4rem">${fmtNum(pct,1)}%</div>
    <div class="big-sub">${done} / ${TOTAL_TR} treninga</div>
    <div class="wk-bar" style="border-radius:3px;margin-top:12px;height:5px"><i style="width:${pct}%"></i></div>
  </div>
  <div class="card"><div class="card-t">Nedeljna kilometraža — plan vs. realizovano</div>${chartWeeks()}</div>
  <div class="card"><div class="card-t">Telesna masa — cilj vs. stvarno</div>${chartWeight()}</div>
  <div class="card"><div class="card-t">Prosečan tempo — odrađena trčanja</div>${chartTempo()}</div>`;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{

function chartWeeks(){
  const W=340,H=168,L=26,B=146,T=24; /* T/B pomereni za 16px da napravi mesta info-liniji na vrhu */
  const max=48,gw=(W-L-6)/14;
  let g='';
  if(CHART_SEL.week!=null){
    const w=PLAN.find(x=>x.w===CHART_SEL.week);
    g+=`<text class="chart-info" x="${L}" y="14" text-anchor="start">N${w.w} · plan ${fmtKm(weekPlanKm(w))} km · urađeno ${fmtKm(weekRealKm(w))} km</text>`;
  } else {
    g+=`<text class="chart-hint" x="${L}" y="14" text-anchor="start">Dodirni nedelju za detalje</text>`;
  }
  [0,12,24,36,48].forEach(v=>{const y=B-(v/max)*(B-T);g+=`<line class="gl" x1="${L}" y1="${y}" x2="${W-2}" y2="${y}"/><text class="ax" x="${L-4}" y="${y+3}" text-anchor="end">${v}</text>`;});
  PLAN.forEach((w,i)=>{
    const x=L+i*gw+2.5,sel=CHART_SEL.week===w.w;
    const ph=(weekPlanKm(w)/max)*(B-T),rh=(weekRealKm(w)/max)*(B-T);
    g+=`<rect x="${x}" y="${B-ph}" width="${gw/2-1.5}" height="${Math.max(ph,1)}" rx="2" fill="${sel?'rgba(255,255,255,.34)':'rgba(255,255,255,.16)'}"/>`;
    if(rh>0)g+=`<rect x="${x+gw/2-0.5}" y="${B-rh}" width="${gw/2-1.5}" height="${Math.max(rh,1)}" rx="2" fill="var(--pink)"${sel?' stroke="#fff" stroke-width=".8"':''}/>`;
    g+=`<text class="ax" x="${x+gw/2-1.5}" y="${B+12}" text-anchor="middle"${sel?' fill="var(--pink)"':''}>${w.w}</text>`;
    /* nevidljiva puna kolona PREKO vidljivih barova — širi, udobniji dodir cilj od uskog 9px bara */
    g+=`<rect x="${x-2.5}" y="${T}" width="${gw-1}" height="${B-T}" fill="transparent" data-wk="${w.w}"/>`;
  });
  return svgW(W,H,g);
}
function chartWeight(){
  const W=340,H=168,L=30,R=8,B=146,T=26; /* T/B pomereni za 16px da napravi mesta info-liniji na vrhu */
  const min=74,max=83;
  const X=i=>L+(i-1)/13*(W-L-R);
  const Y=v=>B-(Math.max(min,Math.min(max,v))-min)/(max-min)*(B-T);
  let g='';
  const act=S.kg.slice().sort((a,b)=>a.date<b.date?-1:1);
  if(CHART_SEL.wt!=null && act[CHART_SEL.wt]){
    const a=act[CHART_SEL.wt], wIdx=Math.round(1+diffD(START,a.date)/7);
    const t=WT_TARGET.find(x=>x.w===wIdx);
    g+=`<text class="chart-info" x="${L}" y="14" text-anchor="start">N${wIdx} · plan ${t?fmtNum(t.kg,1):'—'} kg · uneto ${fmtNum(a.kg,1)} kg</text>`;
  } else {
    g+=`<text class="chart-hint" x="${L}" y="14" text-anchor="start">Dodirni tačku za detalje</text>`;
  }
  [75,77,79,81,83].forEach(v=>{g+=`<line class="gl" x1="${L}" y1="${Y(v)}" x2="${W-R}" y2="${Y(v)}"/><text class="ax" x="${L-4}" y="${Y(v)+3}" text-anchor="end">${v}</text>`;});
  [1,4,7,10,14].forEach(i=>{g+=`<text class="ax" x="${X(i)}" y="${B+12}" text-anchor="middle">N${i}</text>`;});
  g+=`<polyline fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.5" stroke-dasharray="4 4" points="${WT_TARGET.map(t=>X(t.w)+','+Y(t.kg)).join(' ')}"/>`;
  if(act.length){
    const pts=act.map(a=>({x:X(1+diffD(START,a.date)/7),y:Y(a.kg)}));
    if(pts.length>1)g+=`<polyline fill="none" stroke="var(--pink)" stroke-width="2" points="${pts.map(p=>p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ')}"/>`;
    pts.forEach((p,i)=>{
      const sel=CHART_SEL.wt===i;
      g+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${sel?4.8:3.4}" fill="var(--pink)"${sel?' stroke="#fff" stroke-width="1"':''}/>`;
      /* nevidljiv širi krug PREKO vidljive tačke — udobniji dodir cilj od 3.4px prečnika */
      g+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="11" fill="transparent" data-wtpt="${i}"/>`;
    });
  }
  g+=`<text class="ax" x="${W-R}" y="${T-4}" text-anchor="end">isprekidano = cilj 82→75,5</text>`;
  return svgW(W,H,g);
}
function chartTempo(){
  const runs=[];
  PLAN.forEach(w=>w.days.forEach(d=>{
    const l=S.log[d.id];
    if(l&&l.status==='done'&&l.km>0&&l.sec>0)runs.push({date:l.ts||d.date||'',t:l.sec/l.km});
  }));
  runs.sort((a,b)=>a.date<b.date?-1:1);
  if(!runs.length)return `<div class="empty">Unesi distancu i vreme na treninzima — trend se crta automatski.</div>`;
  const W=340,H=152,L=38,R=10,B=128,T=12;
  let lo=Math.min(...runs.map(r=>r.t))-15,hi=Math.max(...runs.map(r=>r.t))+15;
  if(hi-lo<50){const m=(hi+lo)/2;lo=m-25;hi=m+25;}
  const X=i=>runs.length>1?L+i/(runs.length-1)*(W-L-R):L+(W-L-R)/2;
  const Y=v=>T+(v-lo)/(hi-lo)*(B-T);
  let g='';
  [lo+(hi-lo)*.12,(lo+hi)/2,hi-(hi-lo)*.12].forEach(v=>{g+=`<line class="gl" x1="${L}" y1="${Y(v).toFixed(1)}" x2="${W-R}" y2="${Y(v).toFixed(1)}"/><text class="ax" x="${L-4}" y="${(Y(v)+3).toFixed(1)}" text-anchor="end">${fmtTempo(v)}</text>`;});
  if(runs.length>1)g+=`<polyline fill="none" stroke="var(--cyan)" stroke-width="2" points="${runs.map((r,i)=>X(i).toFixed(1)+','+Y(r.t).toFixed(1)).join(' ')}"/>`;
  runs.forEach((r,i)=>g+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(r.t).toFixed(1)}" r="3.4" fill="var(--cyan)"/>`);
  g+=`<text class="ax" x="${W-R}" y="${B+12}" text-anchor="end">gore = brže</text>`;
  return svgW(W,H,g);
}

  let g='';
  [0,5,10].forEach(v=>{g+=`<line class="gl" x1="${L}" y1="${Y(v)}" x2="${W-R}" y2="${Y(v)}"/><text class="ax" x="${L-4}" y="${Y(v)+3}" text-anchor="end">${v}</text>`;});
  g+=`<line x1="${L}" y1="${Y(3)}" x2="${W-R}" y2="${Y(3)}" stroke="rgba(255,176,32,.4)" stroke-dasharray="3 4"/>`;
  g+=`<line x1="${L}" y1="${Y(6)}" x2="${W-R}" y2="${Y(6)}" stroke="rgba(255,69,58,.4)" stroke-dasharray="3 4"/>`;
  if(es.length>1)g+=`<polyline fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.5" points="${es.map(e=>X(e.date).toFixed(1)+','+Y(e.pain).toFixed(1)).join(' ')}"/>`;

  return svgW(W,H,g);
}

/* VDOT trend kroz vreme — crta vdotLog kao liniju. Vidi se raste li forma. */
function chartVdotTrend(){
  const vl=(S.vdotLog||[]).slice().sort((a,b)=>a.ts<b.ts?-1:1);
  if(vl.length<2) return '<div style="color:var(--txt3);font-size:.8rem;padding:12px 0">Trend se prikazuje kad bude bar 2 zabeležene VDOT vrednosti. Nakupljaj kroz treninge.</div>';
  const W=340,H=150,L=32,R=8,B=126,T=10;
  const vals=vl.map(e=>e.vdot);
  const bv=baselineVdot(), goal=Math.round(vdotFrom5k(1170)*10)/10;
  const lo=Math.min(bv,goal,...vals)-1, hi=Math.max(bv,goal,...vals)+1;
  const X=i=>L+(vl.length===1?0:i/(vl.length-1)*(W-L-R));
  const Y=v=>B-((v-lo)/(hi-lo))*(B-T);
  let g='';
  // horizontalne linije: baseline i cilj
  g+=`<line x1="${L}" y1="${Y(goal).toFixed(1)}" x2="${W-R}" y2="${Y(goal).toFixed(1)}" stroke="var(--green)" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>`;
  g+=`<text x="${W-R}" y="${(Y(goal)-4).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--green)">cilj ${goal}</text>`;
  g+=`<line x1="${L}" y1="${Y(bv).toFixed(1)}" x2="${W-R}" y2="${Y(bv).toFixed(1)}" stroke="var(--txt3)" stroke-width="1" stroke-dasharray="2 3" opacity="0.5"/>`;
  // linija VDOT
  let pts=vl.map((e,i)=>`${X(i).toFixed(1)},${Y(e.vdot).toFixed(1)}`).join(' ');
  g+=`<polyline points="${pts}" fill="none" stroke="var(--cyan)" stroke-width="2"/>`;
  vl.forEach((e,i)=>{ g+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(e.vdot).toFixed(1)}" r="3" fill="var(--cyan)"/>`; });
  // labele prve i zadnje vrednosti
  g+=`<text x="${X(0).toFixed(1)}" y="${(Y(vl[0].vdot)-7).toFixed(1)}" font-size="10" font-weight="700" fill="var(--txt2)">${vl[0].vdot}</text>`;
  g+=`<text x="${X(vl.length-1).toFixed(1)}" y="${(Y(vl[vl.length-1].vdot)-7).toFixed(1)}" text-anchor="end" font-size="10" font-weight="700" fill="var(--cyan)">${vl[vl.length-1].vdot}</text>`;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${g}</svg>`;
}
/* Sažetak svih treninga za LLM trend analizu. NE šalje pun po-krug niz (previše),
   nego sažme svaki trening: datum, tip, tempo, drift (prvi->poslednji puls), kadenca. */
function trendSummary(){
  const out=[];
  DATED.forEach(d=>{
    const l=S.log[d.id]; if(!l||l.status!=='done')return;
    const row={date:l.runDate||l.ts||d.date, tag:d.tag};
    if(Array.isArray(l.laps)&&l.laps.length){
      const hrs=l.laps.map(x=>x.avgHr).filter(x=>x!=null);
      const cads=l.laps.map(x=>x.cadence).filter(x=>x!=null);
      row.tempo=l.laps.length?Math.round(l.laps.reduce((s,x)=>s+x.paceSec,0)/l.laps.length):null;
      if(hrs.length>=2){row.driftStart=hrs[0];row.driftEnd=hrs[hrs.length-1];row.drift=hrs[hrs.length-1]-hrs[0];}
      if(cads.length)row.cadence=Math.round(cads.reduce((s,x)=>s+x,0)/cads.length);
    } else if(Array.isArray(l.perKm)&&l.perKm.length){
      const hrs=l.perKm.map(x=>x.hr).filter(x=>x!=null);
      const cads=l.perKm.map(x=>x.cadence).filter(x=>x!=null);
      if(hrs.length>=2){row.driftStart=hrs[0];row.driftEnd=hrs[hrs.length-1];row.drift=hrs[hrs.length-1]-hrs[0];}
      if(cads.length)row.cadence=Math.round(cads.reduce((s,x)=>s+x,0)/cads.length);
    } else {
      if(l.km&&l.sec)row.tempo=Math.round(l.sec/l.km);
      if(l.hr)row.avgHr=l.hr;
    }
    out.push(row);
  });
  // VDOT istorija
  const vl=(S.vdotLog||[]).slice().sort((a,b)=>a.ts<b.ts?-1:1).map(e=>({date:e.ts,vdot:e.vdot}));
  return {treninzi:out, vdot:vl, baseline:baselineVdot(), cilj:Math.round(vdotFrom5k(1170)*10)/10};
}
function chartPred(pc){
  const W=340,H=152,L=36,R=8,B=128,T=10;
  const lo=17.8,hi=22.8;
  const X=i=>L+i/(PRED.length-1)*(W-L-R);
  const Y=m=>B-(Math.max(lo,Math.min(hi,m))-lo)/(hi-lo)*(B-T);
  let g='';
  [18,19,20,21,22].forEach(v=>{g+=`<line class="gl" x1="${L}" y1="${Y(v).toFixed(1)}" x2="${W-R}" y2="${Y(v).toFixed(1)}"/><text class="ax" x="${L-4}" y="${(Y(v)+3).toFixed(1)}" text-anchor="end">${v}:00</text>`;});
  g+=`<line x1="${L}" y1="${Y(19.5).toFixed(1)}" x2="${W-R}" y2="${Y(19.5).toFixed(1)}" stroke="var(--cyan)" stroke-width="1.5" stroke-dasharray="5 4"/>`;
  g+=`<polyline fill="none" stroke="rgba(255,255,255,.25)" stroke-width="1.5" points="${PRED.map((r,i)=>X(i).toFixed(1)+','+Y(r.p5k/60).toFixed(1)).join(' ')}"/>`;
  const ent=pc.rows.map((x,i)=>({p:x.pred,i})).filter(x=>x.p!=null);
  if(ent.length>1)g+=`<polyline fill="none" stroke="var(--pink)" stroke-width="2" points="${ent.map(x=>X(x.i).toFixed(1)+','+Y(x.p/60).toFixed(1)).join(' ')}"/>`;
  ent.forEach(x=>g+=`<circle cx="${X(x.i).toFixed(1)}" cy="${Y(x.p/60).toFixed(1)}" r="3.6" fill="var(--pink)"/>`);
  g+=`<text class="ax" x="${W-R}" y="${(Y(19.5)-5).toFixed(1)}" text-anchor="end" fill="var(--cyan)">cilj 19:30</text>`;
  return svgW(W,H,g);
}

async function ensureToken(){
  if(!S.strava)throw new Error('Strava nije povezana');
  if(S.strava.expiresAt*1000>Date.now()+300000)return;
  const r=await fetch('/api/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refresh_token:S.strava.refresh})});
  const j=await r.json();
  if(!r.ok||!j.access_token)throw new Error('Osvežavanje tokena nije uspelo'+(j.message?': '+j.message:''));
  S.strava.access=j.access_token;S.strava.refresh=j.refresh_token||S.strava.refresh;S.strava.expiresAt=j.expires_at;save();
}
async function stApi(path,_retried){
  await ensureToken();
  const r=await fetch('https://www.strava.com/api/v3'+path,{headers:{Authorization:'Bearer '+S.strava.access}});
  if(r.ok)return r.json();
  let body=null;try{body=await r.json();}catch(e){}
  const msg=(body&&body.message)?body.message:'';
  if(r.status===401&&!_retried){
    /* istekao/opozvan access token — jedan forsirani refresh pa ponovi */
    try{S.strava.expiresAt=0;await ensureToken();return stApi(path,true);}catch(e){}
  }
  if(r.status===429)throw new Error('Strava rate limit (429) — sačekaj do isteka 15-min prozora pa pokušaj ponovo'+(msg?' · '+msg:''));
  throw new Error('Strava '+r.status+(msg?' — '+msg:'')+(body&&body.errors?' · '+JSON.stringify(body.errors):''));
}
async function stravaSync(manual){
  if(!S.strava){if(manual)alert('Strava nije povezana.');return;}
  try{
    const after=Math.floor(s2d(START).getTime()/1000);
    const acts=[];let page=1;
    while(page<=4){
      const b=await stApi('/athlete/activities?after='+after+'&per_page=100&page='+page);
      acts.push(...b);
      if(b.length<100)break;page++;
    }
    const runs=acts.filter(a=>a.type==='Run'||a.sport_type==='Run');
    const byDate={};
    runs.forEach(a=>{const dt=String(a.start_date_local||'').slice(0,10);if(dt)(byDate[dt]=byDate[dt]||[]).push(a);});
    let imp=0,props=0;
    for(const date of Object.keys(byDate)){
      const d=BY_DATE[date];
      if(!d||d.rest||d.km==null)continue;           /* samo trkački dani plana */
      const a=pickClosest(byDate[date],d.km);        /* 2 trčanja isti dan → bliže planu */
      const l=S.log[d.id]||(S.log[d.id]={});
      l.runDate=date; /* pravi datum trčanja iz Strave — NE dira se ručnim izmenama, koristi ga trend */
      if(!l.lock){                                   /* ručna korekcija ima trajnu prednost */
        l.status='done';
        l.km=Math.round(a.distance/10)/100;
        l.sec=a.moving_time;
        if(a.average_heartrate)l.hr=Math.round(a.average_heartrate);
        l.ts=date;l.src='strava';l.stravaId=a.id;
        syncSide(d);imp++;
      }
      if(d.tag==='int'||d.tag==='tempo'){ /* bez QS uslova — dan izmenjen u kvalitet nema QS unos, a detectWorkSegments ga i ne traži */
        const rowId=predRowFor(d);
        if(rowId&&!S.predLock[rowId]&&S.pred[rowId]==null){ /* povuci samo jednom — štednja API kvote */
          try{
            /* PRIMARNO: streamovi + prepoznavanje radnih segmenata po brzini.
               Nezavisno od Stravinih lapova (koji nepouzdano vraćaju čas
               strukturne čas auto-1km podelu). Jedan API poziv. */
            const st=await stApi('/activities/'+a.id+'/streams?keys=distance,time,heartrate,cadence,watts&key_by_type=true');
            const segs=detectWorkSegments(st);
            if(segs&&segs.length){
              const totT=segs.reduce((s,x)=>s+x.paceSec*x.distM/1000,0);
              const totD=segs.reduce((s,x)=>s+x.distM,0);
              const t=Math.round(totT/(totD/1000));
              if(t){S.pred[rowId]=t;recordVdot(rowId,t,date);props++;}
              if(S.log[d.id]) S.log[d.id].laps=segs;
            } else {
              /* FALLBACK 1: po-km presek iz istih streamova (kontinuiran kvalitetni
                 napor koji segmentacija ne razdvaja) */
              if(S.log[d.id]){
                const perKm=perKmDetail(st);
                if(perKm.length) S.log[d.id].perKm=perKm;
              }
              /* FALLBACK 2 za VDOT tempo: stari put preko lapova — traži QS spec,
                 koji izmenjeni dan nema, pa se preskače */
              if(QS[d.id])try{
                const laps=await stApi('/activities/'+a.id+'/laps');
                const t=workLapsTempo(laps,QS[d.id]);
                if(t){S.pred[rowId]=t;recordVdot(rowId,t,date);props++;}
              }catch(e){}
            }
          }catch(e){}
        }
      } else if((d.tag==='lako'||d.tag==='lr') && S.log[d.id] && !S.log[d.id].perKm && !l.lock){
        /* Kontinuirana trčanja (lako/LR): povuci streamove i sačuvaj po-km presek
           (puls/kadenca/tempo svakog km) za analizu drifta i kadence. Samo jednom. */
        try{
          const st=await stApi('/activities/'+a.id+'/streams?keys=distance,heartrate,cadence,time&key_by_type=true');
          const perKm=perKmDetail(st);
          if(perKm.length && S.log[d.id]) S.log[d.id].perKm=perKm;
        }catch(e){}
      }
    }
    fixVdotDates(); /* uskladi VDOT datume sa pravim datumima trčanja */
    S.strava.lastSync=Date.now();save();
    renderHeader();PAGES[ACTIVE]();
    if(manual)alert('Sinhronizacija gotova.\nAžurirano trčanja: '+imp+'\nUpisano tempa u Predikciju: '+props);
  }catch(e){
    if(manual)alert('Sync nije uspeo: '+e.message);
  }
}
function handleOAuthReturn(){
  const q=new URLSearchParams(location.search);
  const code=q.get('code');
  if(!code)return;
  const scope=q.get('scope')||'';
  history.replaceState(null,'',location.pathname);
  fetch('/api/auth?code='+encodeURIComponent(code)).then(r=>r.json()).then(j=>{
    if(j.access_token){
      S.strava={access:j.access_token,refresh:j.refresh_token,expiresAt:j.expires_at,
        athlete:j.athlete?((j.athlete.firstname||'')+' '+(j.athlete.lastname||'')).trim():'',
        scope:scope,lastSync:0};
      save();
      alert('Strava povezana'+(S.strava.athlete?' — '+S.strava.athlete:'')+'.');
      stravaSync(true);
    }else{
      alert('Povezivanje nije uspelo: '+(j.message||JSON.stringify(j.errors||j)));
    }
  }).catch(e=>alert('Povezivanje nije uspelo: '+e.message));
}

/* ---------- INIT ---------- */
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>setPage(b.dataset.pg));
$('#btn-gear').onclick=openSettings;
$('#backdrop').onclick=closeSheet;
if(fixVdotDates())save(); /* jednokratna popravka VDOT datuma iz postojećih runDate */
renderHeader();
setPage('danas');
handleOAuthReturn();
if(S.strava&&navigator.onLine&&Date.now()-(S.strava.lastSync||0)>3600000)stravaSync(false);
if('serviceWorker' in navigator&&(location.protocol==='https:'||location.hostname==='localhost')){
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(refreshing)return; refreshing=true; location.reload();
  });
  navigator.serviceWorker.register('./sw.js').then(reg=>{
    reg.update();
    setInterval(()=>reg.update(), 60*60*1000);
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      if(!nw)return;
      nw.addEventListener('statechange',()=>{
        if(nw.state==='installed' && navigator.serviceWorker.controller) showUpdateBanner(nw);
      });
    });
  }).catch(()=>{});
}
function showUpdateBanner(worker){
  if($('#update-banner'))return;
  const b=document.createElement('div');
  b.id='update-banner';
  b.style.cssText='position:fixed;left:16px;right:16px;bottom:calc(env(safe-area-inset-bottom) + 84px);z-index:200;background:var(--pink,#fa2e55);color:#fff;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;font-weight:700;font-size:.9rem;box-shadow:0 8px 24px rgba(0,0,0,.4)';
  b.innerHTML=`<span style="flex:1">Dostupna je nova verzija</span><button id="update-go" style="background:#fff;color:var(--pink,#fa2e55);border:0;border-radius:10px;padding:8px 16px;font-weight:800;font-size:.85rem">Osveži</button>`;
  document.body.appendChild(b);
  $('#update-go').onclick=()=>{
    b.querySelector('span').textContent='Osvežavam…';
    worker.postMessage({type:'SKIP_WAITING'});
  };
}
